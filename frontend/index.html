<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Route | AI 마케팅 네비게이터</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@300;400;500;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --blue: #1f6feb;
      --blue-light: #388bfd;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --border: rgba(255,255,255,0.08);
      --glass: rgba(255,255,255,0.04);
    }

    body {
      font-family: 'Noto Sans KR', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(31,111,235,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Top nav bar */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,17,23,0.8);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo { width: 28px; height: 28px; }

    .topbar-name {
      font-size: 14px;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: -0.2px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-ghost {
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .btn-ghost:hover { background: var(--glass); border-color: rgba(255,255,255,0.15); }

    .btn-primary {
      padding: 7px 18px;
      border-radius: 8px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .btn-primary:hover {
      background: var(--blue-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(31,111,235,0.3);
    }

    /* Hero */
    .hero {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 80px 20px 0;
    }

    .beta-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(31,111,235,0.12);
      border: 1px solid rgba(31,111,235,0.25);
      color: var(--blue-light);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    .logo-wrap {
      margin-bottom: 28px;
      position: relative;
    }
    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 36px;
      background: radial-gradient(circle, rgba(31,111,235,0.16) 0%, transparent 70%);
    }
    .logo-main {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      display: block;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 32px rgba(31,111,235,0.25);
    }

    .hero-eyebrow {
      font-size: 13px;
      font-weight: 500;
      color: var(--blue-light);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .hero-name {
      font-size: clamp(38px, 6vw, 58px);
      font-weight: 800;
      color: #e6edf3;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 16px;
      font-family: 'Inter', sans-serif;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 420px;
    }

    /* CTA buttons */
    .hero-cta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 56px;
    }

    .btn-start {
      padding: 13px 30px;
      border-radius: 10px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-start:hover {
      background: var(--blue-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(31,111,235,0.35);
    }
    .btn-start svg { transition: transform .2s; }
    .btn-start:hover svg { transform: translateX(3px); }

    .btn-login-hero {
      padding: 13px 22px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .btn-login-hero:hover { background: var(--glass); }

    /* Channel logos — 2 rows */
    .channels-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0.6;
    }

    .channels-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .channels-row {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: nowrap;
      justify-content: center;
    }

    .ch-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: opacity .15s;
    }
    .ch-item:hover { opacity: 1; }

    /* 컬러 아이콘: 기본=그레이, 호버=브랜드 컬러 */
    .ch-icon {
      width: 26px;
      height: 26px;
      filter: grayscale(100%) brightness(0.65);
      transition: filter .25s, transform .2s;
    }
    .ch-item:hover .ch-icon {
      filter: none;
      transform: scale(1.15);
    }
    /* 다크(검정 계열) 아이콘: Threads, TikTok — 반전해서 흰색으로 */
    .ch-icon-mono {
      width: 26px;
      height: 26px;
      filter: brightness(0) invert(0.6);
      transition: filter .25s, transform .2s;
    }
    .ch-item:hover .ch-icon-mono {
      filter: brightness(0) invert(0.95);
      transform: scale(1.15);
    }

    .ch-name {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #161b22;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      animation: slideUp .22s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-icon { font-size: 36px; margin-bottom: 16px; }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 12px;
    }

    .modal-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 28px;
    }
    .modal-highlight { color: var(--blue-light); font-weight: 600; }

    .modal-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .modal-btn:hover { background: var(--blue-light); }
  </style>
</head>
<body>

  <!-- Top nav -->
  <nav class="topbar">
    <div class="topbar-brand">
      <img src="logo.svg" class="topbar-logo" alt="M" />
      <span class="topbar-name">Marketing Route</span>
    </div>
    <div class="topbar-actions">
      <button class="btn-ghost" onclick="trackAndShowModal('login')">로그인</button>
      <button class="btn-ghost" onclick="trackAndShowModal('signup')">회원가입</button>
      <button class="btn-primary" onclick="goToApp()">시작하기 →</button>
    </div>
  </nav>

  <!-- Hero -->
  <main class="hero">

    <div class="beta-badge"><span>●</span>&nbsp;BETA</div>

    <div class="logo-wrap">
      <img src="logo.svg" class="logo-main" alt="Marketing Route" />
    </div>

    <p class="hero-eyebrow">AI 마케팅 네비게이터</p>
    <h1 class="hero-name">Marketing Route</h1>
    <p class="hero-sub">
      AI 에이전시팀이 기획부터 배포까지.<br>
      콘텐츠 제작의 모든 루트를 자동화합니다.
    </p>

    <div class="hero-cta">
      <button class="btn-start" onclick="goToApp()">
        무료로 시작하기
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn-login-hero" onclick="trackAndShowModal('login')">로그인</button>
    </div>

    <!-- Channel logos: 2 rows × 5 (9채널 + 1여백) -->
    <div class="channels-wrap">
      <span class="channels-label">지원 채널</span>
      <div class="channels-row">
        <div class="ch-item" title="팀원1 담당 — 블로그">
          <img class="ch-icon" src="assets/icons/wordpress.svg" alt="WordPress" />
          <span class="ch-name">WordPress</span>
        </div>
        <div class="ch-item" title="팀원1 담당 — 블로그">
          <img class="ch-icon" src="assets/icons/tistory.svg" alt="Tistory" />
          <span class="ch-name">티스토리</span>
        </div>
        <div class="ch-item" title="팀원1 담당 — 블로그">
          <img class="ch-icon" src="assets/icons/naver.svg" alt="Naver Blog" />
          <span class="ch-name">네이버 블로그</span>
        </div>
        <div class="ch-item" title="팀원2 담당 — 텍스트 SNS">
          <img class="ch-icon" src="assets/icons/linkedin.svg" alt="LinkedIn" />
          <span class="ch-name">LinkedIn</span>
        </div>
        <div class="ch-item" title="팀원2 담당 — 텍스트 SNS">
          <img class="ch-icon-mono" src="assets/icons/threads.svg" alt="Threads" />
          <span class="ch-name">Threads</span>
        </div>
      </div>
      <div class="channels-row">
        <div class="ch-item" title="팀원3 담당 — 이미지 SNS">
          <img class="ch-icon" src="assets/icons/instagram.svg" alt="Instagram" />
          <span class="ch-name">Instagram</span>
        </div>
        <div class="ch-item" title="팀원3 담당 — 이미지 SNS">
          <img class="ch-icon" src="assets/icons/facebook.svg" alt="Facebook" />
          <span class="ch-name">Facebook</span>
        </div>
        <div class="ch-item" title="팀원4 담당 — 영상">
          <img class="ch-icon" src="assets/icons/youtube.svg" alt="YouTube" />
          <span class="ch-name">YouTube</span>
        </div>
        <div class="ch-item" title="팀원4 담당 — 영상">
          <img class="ch-icon-mono" src="assets/icons/tiktok.svg" alt="TikTok" />
          <span class="ch-name">TikTok</span>
        </div>
      </div>
    </div>

  </main>

  <!-- Beta modal -->
  <div class="modal-overlay" id="beta-modal" onclick="closeModal(event)">
    <div class="modal-box">
      <div class="modal-icon">🎉</div>
      <div class="modal-title">현재 베타 서비스 중입니다</div>
      <div class="modal-desc">
        베타 기간 동안은
        <span class="modal-highlight">로그인 없이 모든 기능을 이용하실 수 있습니다!</span><br><br>
        정식 출시 시 사전 등록 혜택을 드릴 예정입니다.
      </div>
      <button class="modal-btn" onclick="goToApp()">지금 바로 시작하기 →</button>
    </div>
  </div>

  <script>
    // ── 경량 Analytics (localStorage 기반) ──────────────────────────────────
    // 추후 GA4 / Mixpanel 이벤트로 교체 예정
    function _track(event) {
      try {
        const key = 'mr_analytics';
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        data[event] = (data[event] || 0) + 1;
        data[event + '_last'] = new Date().toISOString();
        localStorage.setItem(key, JSON.stringify(data));
      } catch(e) {}
    }

    // 로그인 / 회원가입 클릭 → 기록 후 베타 안내 모달
    function trackAndShowModal(type) {
      _track('click_' + type);
      document.getElementById('beta-modal').classList.add('open');
    }

    function closeModal(e) {
      if (e.target.id === 'beta-modal') {
        document.getElementById('beta-modal').classList.remove('open');
      }
    }

    function goToApp() {
      _track('click_start');
      window.location.href = 'app.html';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('beta-modal').classList.remove('open');
      }
    });
  </script>

</body>
</html>
